<h2>git-tutorial</h2>
<p>init a new repository:</p>
<pre>
$ git init
</pre>
<p>watch the result:</p>
<pre>
$ ls .git/
</pre>
<p>add-and-commit a file:</p>
<pre>
$ git add file.txt
$ git commit -m "initial version, of my file"
</pre>
