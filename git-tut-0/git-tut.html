<p>init git for a user:</p>
<pre>
$ vi ~/.gitconfig
</pre>
<p>example content:</p>
<pre>
[user]
	email = usr@example.ext.no-reply
	name = your-nickname
</pre>
<p>email-and-name field's should start w/ a tabulation<br />
tab. / <code>'\t'</code>:</p>
