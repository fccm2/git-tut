<title>git-tutorial</title>
</head>
<body>
<pre>
$ git init
</pre>
<pre>
$ git add file.txt
</pre>
<pre>
$ git commit -m "msg."
</pre>
<pre>
$ git tag "name_of_the_tag"
</pre>
<pre>
$ git remote add origin https://w-host.ext/user_name/repo_name.git
</pre>
<pre>
$ git push
</pre>
<pre>
$ git push --tags
</pre>
</body>
